name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          ADVISER_BACKEND_ENV: ${{ secrets.ADVISER_BACKEND_ENV }}
          ADVISER_INFRA_ENV: ${{ secrets.ADVISER_INFRA_ENV }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: ADVISER_BACKEND_ENV,ADVISER_INFRA_ENV
          command_timeout: 10m
          script: |
            set -e
            APP_DIR="/opt/accountant-adviser"

            echo "=== Deploying AI Accountant Adviser ==="

            # Clone or pull latest code
            if [ ! -d "$APP_DIR" ]; then
              sudo git clone https://github.com/fix2015/accountant-adviser.git "$APP_DIR"
              sudo chown -R $USER:$USER "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Write environment files
            echo "$ADVISER_BACKEND_ENV" > backend/.env
            echo "$ADVISER_INFRA_ENV" > infra/.env

            # Create external volumes if they don't exist
            docker volume create adviser_postgres_data 2>/dev/null || true
            docker volume create adviser_redis_data 2>/dev/null || true

            # Log in to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            cd infra
            docker compose -f docker-compose.prod.yml pull

            # Restart services
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for backend to be healthy
            echo "Waiting for backend health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8001/api/v1/health > /dev/null 2>&1; then
                echo "Backend is healthy!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Health check failed after 30 attempts"
                docker compose -f docker-compose.prod.yml logs backend --tail=50
                exit 1
              fi
              echo "Attempt $i/30 - waiting..."
              sleep 5
            done

            # Show running containers
            echo ""
            echo "=== Running containers ==="
            docker ps --filter "name=adviser_" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Deploy complete ==="
